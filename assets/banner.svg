<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">

  <!-- Background — charcoal, same as Oasuta Lab -->
  <rect width="1280" height="400" fill="#2e2e2e"/>

  <!-- ── Left: text content ── -->

  <!-- App name -->
  <text x="80" y="185"
        font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="100" font-weight="700" letter-spacing="-3" fill="white">CpSync</text>

  <!-- Tagline -->
  <text x="84" y="240"
        font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" fill="#8a9099">Cross-platform clipboard sync</text>

  <!-- Flow pills — sage / blue / peach matching brand palette -->
  <!-- iOS — sage green -->
  <rect x="84" y="278" width="76" height="34" rx="17" fill="#87a882" fill-opacity="0.18" stroke="#87a882" stroke-width="1.5"/>
  <text x="122" y="300" text-anchor="middle"
        font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="600" fill="#87a882">iOS</text>

  <text x="174" y="300" font-family="sans-serif" font-size="15" fill="#555d66">→</text>

  <!-- Server — steel blue -->
  <rect x="196" y="278" width="96" height="34" rx="17" fill="#7d9baf" fill-opacity="0.18" stroke="#7d9baf" stroke-width="1.5"/>
  <text x="244" y="300" text-anchor="middle"
        font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="600" fill="#7d9baf">Server</text>

  <text x="306" y="300" font-family="sans-serif" font-size="15" fill="#555d66">→</text>

  <!-- Windows — peach -->
  <rect x="328" y="278" width="106" height="34" rx="17" fill="#d08060" fill-opacity="0.18" stroke="#d08060" stroke-width="1.5"/>
  <text x="381" y="300" text-anchor="middle"
        font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="600" fill="#d08060">Windows</text>

  <!-- ── Right: three overlapping circles — Oasuta Lab motif ── -->
  <!--
    Circles centered at y=180, r=95, spacing=140 (50px overlap each)
    cx1=825  cx2=965  cx3=1105
    Colors: sage green / steel blue / peach
  -->
  <circle cx="825"  cy="180" r="95" fill="#87a882"/>
  <circle cx="965"  cy="180" r="95" fill="#7d9baf"/>
  <circle cx="1105" cy="180" r="95" fill="#d08060"/>

  <!-- Red-orange accent bar — under circle 3, same as Oasuta Lab -->
  <rect x="1025" y="305" width="160" height="14" rx="7" fill="#c94228"/>

</svg>
